<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Center</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --base-font-size: 15px;
      --base-line-height: 1.7;
      --sidebar-width: 280px;
      --sidebar-background: #fafbfc;
      --sidebar-border-color: #e8eaed;
      --sidebar-nav-link-color: #333;
      --sidebar-nav-link-color--active: #3182f6;
      --sidebar-nav-link-border-color--active: #3182f6;
      --sidebar-nav-link-font-weight--active: 600;
      --link-color: #3182f6;
      --link-color--hover: #1b64da;
      --heading-color: #191f28;
    }
    /* 사이드바 섹션 헤더 */
    .sidebar-nav > ul > li > strong {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #8b95a1;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 16px 0 4px;
      margin-top: 8px;
      border-top: 1px solid #e8eaed;
    }
    .sidebar-nav > ul > li:first-child > strong {
      border-top: none;
      margin-top: 0;
    }
    /* 사이드바 링크 */
    .sidebar-nav li > a {
      padding: 4px 0;
      font-size: 14px;
    }
    .sidebar-nav ul ul {
      padding-left: 16px;
    }
    .app-name-link img {
      width: 24px;
      vertical-align: middle;
      margin-right: 8px;
    }
    /* 테이블 */
    .markdown-section table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      line-height: 1.5;
      display: table;
    }
    .markdown-section thead th {
      background: #f8f9fa;
      font-weight: 600;
      color: #4e5968;
      font-size: 13px;
      padding: 10px 12px;
      border-bottom: 2px solid #e8eaed;
      white-space: nowrap;
    }
    .markdown-section tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid #f1f3f5;
      vertical-align: top;
      color: #333d4b;
    }
    .markdown-section tbody tr:hover {
      background: #f8f9fa;
    }
    /* 좁은 열(ID, 상태, 우선순위 등) 줄바꿈 방지 */
    .markdown-section td:first-child,
    .markdown-section th:first-child {
      white-space: nowrap;
    }
    /* 체크박스 */
    .markdown-section input[type="checkbox"] {
      transform: scale(1.15);
      margin: 0;
    }
    /* 코드 블록 */
    .markdown-section code {
      background: #f1f3f5;
      color: #e45649;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
    .markdown-section pre {
      background: #1e1e1e;
      border-radius: 8px;
      padding: 16px;
    }
    .markdown-section pre code {
      background: none;
      color: #d4d4d4;
      padding: 0;
    }
    /* 수평선 — 헤딩 사이 구분선을 가볍게 */
    .markdown-section hr {
      border: none;
      border-top: 1px solid #f1f3f5;
      margin: 32px 0;
    }
    /* 인용문 */
    .markdown-section blockquote {
      border-left: 4px solid #3182f6;
      background: #f8f9fa;
      padding: 12px 16px;
      margin: 16px 0;
      color: #4e5968;
      border-radius: 0 6px 6px 0;
    }
    .markdown-section blockquote p {
      margin: 0;
    }
    /* 헤딩 */
    .markdown-section h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e8eaed;
    }
    .markdown-section h2 {
      font-size: 22px;
      font-weight: 700;
      margin: 40px 0 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid #f1f3f5;
    }
    .markdown-section h3 {
      font-size: 18px;
      font-weight: 600;
      margin: 28px 0 8px;
    }
    .markdown-section h4 {
      font-size: 15px;
      font-weight: 600;
      margin: 20px 0 8px;
      color: #4e5968;
    }
    /* 리스트 */
    .markdown-section ul,
    .markdown-section ol {
      padding-left: 24px;
    }
    .markdown-section li {
      margin: 4px 0;
    }
    .markdown-section li > p {
      margin: 4px 0;
    }
    /* 링크 */
    .markdown-section a {
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .markdown-section a:hover {
      border-bottom-color: #3182f6;
    }
    /* 이미지 */
    .markdown-section img {
      border-radius: 8px;
      max-width: 100%;
    }
    /* 컨텐츠 영역 여백 */
    .markdown-section {
      max-width: 900px;
      padding: 30px 40px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      loadSidebar: true,
      subMaxLevel: 0,
      auto2top: true,
      relativePath: true,
      search: {
        placeholder: '검색',
        noData: '결과 없음',
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
