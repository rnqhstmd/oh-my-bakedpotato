name: Deploy context/ to GitHub Pages

on:
  push:
    branches: [main]
    paths: [context/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, Linux]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate _sidebar.md and .nojekyll
        run: |
          cd context
          touch .nojekyll

          echo "" > _sidebar.md

          # 도메인 디렉토리 순회
          for domain_dir in */; do
            domain="${domain_dir%/}"
            readme="${domain_dir}README.md"
            [ ! -f "$readme" ] && continue

            # 도메인명: README.md 첫 번째 # 헤딩
            label=$(head -5 "$readme" | grep '^# ' | head -1 | sed 's/^# //')
            [ -z "$label" ] && label="$domain"

            echo "" >> _sidebar.md
            echo "- **${label}**" >> _sidebar.md
            echo "  - [개요](/${domain}/)" >> _sidebar.md

            # 도메인 내 md 파일 (README 제외)
            for f in "${domain_dir}"*.md; do
              [ ! -f "$f" ] && continue
              fname=$(basename "$f")
              [ "$fname" = "README.md" ] && continue
              doc_label=$(head -5 "$f" | grep '^# ' | head -1 | sed 's/^# //')
              [ -z "$doc_label" ] && doc_label="${fname%.md}"
              echo "  - [${doc_label}](/${f})" >> _sidebar.md
            done

            # 하위 주제 디렉토리
            for sub_dir in "${domain_dir}"*/; do
              [ ! -d "$sub_dir" ] && continue
              [ ! -f "${sub_dir}README.md" ] && continue
              sub_label=$(head -5 "${sub_dir}README.md" | grep '^# ' | head -1 | sed 's/^# //')
              [ -z "$sub_label" ] && sub_label=$(basename "$sub_dir")
              echo "  - [${sub_label}](/${sub_dir})" >> _sidebar.md
            done
          done

          # 공통 섹션
          if [ -f glossary.md ]; then
            echo "" >> _sidebar.md
            echo "- **공통**" >> _sidebar.md
            echo "  - [공통 용어 사전](/glossary.md)" >> _sidebar.md
          fi

          echo "--- Generated _sidebar.md ---"
          cat _sidebar.md

      - uses: actions/upload-pages-artifact@v2
        with:
          path: context

      - id: deployment
        uses: actions/deploy-pages@v2
